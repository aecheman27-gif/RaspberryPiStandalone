<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspberry Pi Electronics — Interactive Course</title>
<style>
:root{color-scheme:light;--pi:#C51A4A;--teal:#0FB5A4;--gold:#F4B41A;--ink:#16202E;--muted:#5C6B7A;--bg:#EEF2F7;--card:#fff;--line:#DCE3EA;--dark:#0F1B2D;--mono:Consolas,"Liberation Mono",Menlo,monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;line-height:1.55}
a{color:var(--pi)}
header{position:sticky;top:0;z-index:30;background:var(--dark);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(15,27,45,.18)}
header h1{font-size:16px;margin:0;font-weight:700}
header .sub{font-size:11.5px;color:#9FB3C8}
.bar{flex:1;min-width:120px;height:11px;background:#22344c;border-radius:7px;overflow:hidden;max-width:340px}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .35s}
.pct{font-weight:700;font-size:13px;min-width:38px;text-align:right}
.menuBtn{display:none;background:#22344c;border:0;color:#fff;border-radius:7px;padding:6px 10px;cursor:pointer;font-size:16px}
.shell{display:flex;max-width:1180px;margin:0 auto;align-items:flex-start}
nav{width:268px;flex:0 0 auto;position:sticky;top:60px;height:calc(100vh - 60px);overflow:auto;padding:16px 12px}
nav .grp{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:14px 8px 6px;font-weight:700}
.navItem{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:13.5px;color:var(--ink)}
.navItem:hover{background:#E5EBF2}
.navItem.active{background:var(--dark);color:#fff}
.navItem .dot{width:20px;height:20px;border-radius:50%;border:2px solid #c2ccd6;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted)}
.navItem.active .dot{border-color:#fff;color:#fff}
.navItem.complete .dot{background:var(--teal);border-color:var(--teal);color:#fff}
main{flex:1;min-width:0;padding:22px 26px 80px}
.kicker{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal)}
h2.title{font-size:26px;margin:4px 0 2px}
.arc{color:var(--muted);font-size:14.5px;margin-bottom:14px}
.markrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 15px;margin:14px 0}
.markrow input{width:22px;height:22px;accent-color:var(--teal);cursor:pointer}
.markrow label{font-weight:600;cursor:pointer}
.obj{background:#EAF7F4;border-left:3px solid var(--teal);padding:11px 15px;border-radius:8px;margin:14px 0;font-size:14px}
h3.sec{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:24px 0 10px}
.proj{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:10px 0}
.proj .pf{font-family:var(--mono);font-size:12px;color:var(--pi);font-weight:700}
.proj .pn{font-weight:700;font-size:15.5px;margin:2px 0 4px}
.proj .pd{font-size:13.5px;color:var(--muted)}
.run{display:inline-flex;align-items:center;gap:8px;margin-top:9px;background:var(--dark);border-radius:8px;padding:7px 10px;font-family:var(--mono);font-size:12px;color:#DCE7E5}
.run button{background:#33496a;border:0;color:#cdd;border-radius:5px;padding:2px 7px;font-size:10.5px;cursor:pointer}
.run button.done{background:var(--teal);color:#fff}
.code{position:relative;background:var(--dark);border-radius:9px;margin:8px 0;padding:11px 44px 11px 13px;font-family:var(--mono);font-size:12.6px;color:#DCE7E5;white-space:pre-wrap;line-height:1.5}
.code .cp{position:absolute;top:7px;right:7px;background:#33496a;border:0;color:#bcd;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer}
.code .cp.done{background:var(--teal);color:#fff}
.gotcha{font-size:12.8px;background:#FFF1F3;border-left:3px solid var(--pi);padding:6px 11px;border-radius:6px;margin-top:8px;color:#7a2233}
.idea{background:#0F1B2D;border-radius:10px;padding:14px 16px;margin:14px 0;color:#cfe}
.idea .lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:700}
.challenge{background:#FFF8E6;border:1px solid var(--gold);border-radius:11px;padding:14px 16px;margin:18px 0}
.challenge .lbl{font-weight:700;color:#8a6500}
.q{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 15px;margin:9px 0}
.q .qq{font-weight:600;font-size:14px}
.q button.reveal{margin-top:8px;background:#EEF2F7;border:1px solid var(--line);border-radius:7px;padding:5px 11px;font-size:12.5px;cursor:pointer;color:var(--ink)}
.q .ans{display:none;margin-top:9px;font-size:13.5px;background:#EAF7F4;border-radius:7px;padding:9px 12px}
.q.open .ans{display:block}
.navbtns{display:flex;justify-content:space-between;margin-top:30px;gap:10px}
.navbtns button{background:var(--dark);color:#fff;border:0;border-radius:9px;padding:11px 18px;font-size:14px;cursor:pointer;font-weight:600}
.navbtns button:disabled{opacity:.35;cursor:default}
figure{margin:14px 0;text-align:center}
figure svg{max-width:100%;height:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px}
figcaption{font-size:12.5px;color:var(--muted);margin-top:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.mini h4{margin:0 0 4px;font-size:14.5px}
.mini p{margin:0;font-size:13px;color:var(--muted)}
@media(max-width:820px){nav{position:fixed;left:0;top:54px;background:var(--bg);z-index:25;box-shadow:2px 0 14px rgba(0,0,0,.12);transform:translateX(-100%);transition:transform .25s;width:280px}nav.open{transform:translateX(0)}.menuBtn{display:block}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <button class="menuBtn" id="menuBtn">☰</button>
  <div style="flex:0 1 auto"><h1>Raspberry Pi Electronics</h1><div class="sub">Interactive course · Freenove kit · Python</div></div>
  <div class="bar"><i id="barFill"></i></div>
  <div class="pct" id="pctText">0%</div>
</header>
<div class="shell"><nav id="nav"></nav><main id="main"></main></div>
<script>
const SIG="#E8743B",PWR="#D9434F",GND="#333",I2C="#0FB5A4";
/* compact data-driven schematic for each lesson */
const SD={
 s1:{c:"LED (with 220Ω resistor)",t:[["anode (+)","GPIO17",SIG],["cathode (−)","GND",GND]]},
 s2:{c:"RGB LED — common anode (220Ω ×3)",t:[["R","GPIO17",SIG],["G","GPIO18",SIG],["B","GPIO27",SIG],["common +","3V3",PWR]]},
 s3:{c:"ADC module (I²C 0x48)",t:[["SDA","GPIO2",I2C],["SCL","GPIO3",I2C],["VCC","3V3",PWR],["GND","GND",GND],["AIN0","potentiometer wiper",SIG]],note:"Plus an LED on GPIO17 → 220Ω → GND."},
 s4:{c:"ADC module (I²C 0x48)",t:[["SDA","GPIO2",I2C],["SCL","GPIO3",I2C],["VCC","3V3",PWR],["GND","GND",GND],["AIN0","photoresistor + 10kΩ divider",SIG]],note:"Plus an LED on GPIO17 → 220Ω → GND."},
 s5:{c:"Servo (SG90)",t:[["VCC (red)","5V",PWR],["Signal (orange)","GPIO18",SIG],["GND (brown)","GND",GND]],note:"DC motor via L293D: in1=27, in2=17, enable=22. Stepper via ULN2003: 18,23,24,25."},
 s6:{c:"LCD1602 — I²C backpack (0x27)",t:[["VCC","5V",PWR],["SDA","GPIO2",I2C],["SCL","GPIO3",I2C],["GND","GND",GND]],note:"74HC595 displays: DS=17, latch=27, clock=22."},
 s7:{c:"HC-SR04 ultrasonic",t:[["VCC","5V",PWR],["Trig","GPIO23",SIG],["Echo","GPIO24 — via R1 1k / R2 2k divider",SIG],["GND","GND",GND]],note:"DHT11 data=17; PIR=17 → LED 18; MPU6050 I²C 0x68."},
 s8:{c:"WebIO — browser controls the Pi",t:[["LED","GPIO17",SIG],["control","phone/browser over the network",I2C]],note:"Run WebIO.py, then open the Pi's IP in a browser. Reuses Blink's LED."}
};
function schem(d){
 const t=d.t,rh=t.length*30+12,H=44+rh+(d.note?30:0);
 let s='<svg viewBox="0 0 520 '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,sans-serif"><title>'+d.c+'</title>';
 s+='<text x="12" y="20" font-size="13" font-weight="700" fill="#16202E">'+d.c+'</text>';
 s+='<rect x="8" y="30" width="504" height="'+rh+'" rx="8" fill="#fff" stroke="#DCE3EA"/>';
 t.forEach(function(r,i){const y=52+i*30;
  s+='<text x="22" y="'+(y+4)+'" font-size="12" font-weight="700" fill="#16202E">'+r[0]+'</text>';
  s+='<line x1="150" y1="'+y+'" x2="280" y2="'+y+'" stroke="'+r[2]+'" stroke-width="3"/><circle cx="150" cy="'+y+'" r="3.5" fill="'+r[2]+'"/><circle cx="280" cy="'+y+'" r="3.5" fill="'+r[2]+'"/>';
  s+='<text x="292" y="'+(y+4)+'" font-size="12" fill="#16202E">'+r[1]+'</text>';
 });
 if(d.note)s+='<text x="12" y="'+(38+rh+18)+'" font-size="11" fill="#5C6B7A">'+d.note+'</text>';
 return s+'</svg>';
}

const PREFIX="~/Freenove_Ultimate_Starter_Kit_for_Raspberry_Pi/Code/Python_GPIOZero_Code/";
const SESSIONS=[
 {id:"s1",n:1,title:"Foundations & first light",arc:"Safety → breadboard → GPIO → digital output → input",
  obj:"Wire a circuit safely, understand the Pi's GPIO pins, and write a loop that turns an LED on and off — and reacts to a button.",
  idea:"from gpiozero import LED\nfrom time import sleep\n\nled = LED(17)\nwhile True:\n    led.on(); sleep(1)\n    led.off(); sleep(1)",
  projects:[{f:"00.0.0_Hello",r:"python Hello.py",d:"Confirms Python runs on the Pi.",g:""},
   {f:"01.1.1_Blink",r:"python Blink.py",d:"Digital output, the forever-loop, sleep() timing.",g:"LED has polarity: long leg toward the resistor/GPIO side; always include the 220Ω resistor."},
   {f:"02.1.1_ButtonLED",r:"python ButtonLED.py",d:"Digital input — the Pi reacts to you.",g:""},
   {f:"02.2.1_Tablelamp",r:"python Tablelamp.py",d:"Toggling state: press flips on/off.",g:""}],
  challenge:"Make the LED blink “SOS” — three short, three long, three short — then pause and repeat.",
  checks:[{q:"What is the 220Ω resistor for?",a:"It limits current through the LED so the LED (and the GPIO pin) aren't damaged. No resistor = a burnt-out LED."},
   {q:"Difference between an input and an output pin?",a:"An output pin is driven HIGH/LOW by your code (light an LED). An input pin reads a voltage set by the outside world (a button)."},
   {q:"Why does the program never reach the line after the while loop?",a:"while True: loops forever, so execution never falls past it — you stop with Ctrl+C."}]},
 {id:"s2",n:2,title:"Light shows & PWM",arc:"Many outputs → PWM (fake in-between levels) → mixing color",
  obj:"Drive several LEDs in sequence and use PWM to dim an LED smoothly and mix any color on an RGB LED.",
  idea:"from gpiozero import PWMLED\nfrom time import sleep\n\nled = PWMLED(18)\nwhile True:\n    led.pulse()   # smooth fade\n    sleep(2)",
  projects:[{f:"03.1.1_LightWater",r:"python LightWater.py",d:"Flowing light across ten LEDs.",g:"One resistor per LED."},
   {f:"04.1.1_BreathingLED",r:"python BreathingLED.py",d:"PWM dimming by duty cycle.",g:""},
   {f:"05.1.1_ColorfulLED",r:"python ColorfulLED.py",d:"RGB = three PWM channels, common anode.",g:"Common-anode LED: common leg to 3V3; code uses active_high=False."}],
  challenge:"Cycle the RGB LED through the rainbow, or pulse a 'heartbeat' down the LED bar.",
  checks:[{q:"What does 'duty cycle' mean?",a:"The fraction of time a pin is ON vs OFF each cycle. More ON time = brighter."},
   {q:"How can an on/off pin dim an LED?",a:"By switching thousands of times a second (PWM); your eye averages it into a brightness."},
   {q:"How many PWM channels make one RGB color?",a:"Three — red, green, and blue."}]},
 {id:"s3",n:3,title:"Sound & the analog world",arc:"Buzzers → why the Pi can't read analog → the ADC",
  obj:"Make sound with both buzzer types, and read a knob through the kit's I²C ADC chip.",
  projects:[{f:"06.1.1_Doorbell",r:"python Doorbell.py",d:"Active buzzer triggered by a button.",g:""},
   {f:"06.2.1_Alertor",r:"python Alertor.py",d:"Passive buzzer playing tones.",g:""},
   {f:"07.1.1_ADC",r:"python ADC.py",d:"Read an analog voltage as a number. Open ADC.py to see how it reads the chip.",g:"First I²C project: if it errors, run sudo i2cdetect -y 1 and confirm I²C is enabled."},
   {f:"08.1.1_Softlight",r:"python Softlight.py",d:"A potentiometer dimming an LED.",g:""}],
  challenge:"Use the potentiometer to control the pitch of the passive buzzer.",
  checks:[{q:"Why does an analog sensor need the ADC chip?",a:"GPIO only reads on/off. The ADC measures the actual voltage and gives Python a number."},
   {q:"Active vs passive buzzer?",a:"Active = one fixed tone when powered; passive = plays whatever pitch you drive in."},
   {q:"What does i2cdetect -y 1 tell you?",a:"It lists the I²C addresses present — proof the ADC/LCD is wired and seen."}]},
 {id:"s4",n:4,title:"Sensing the environment",arc:"Sensors are resistors that change → thresholds → two-axis input",
  obj:"Turn light and temperature into numbers, add a threshold to make a 'smart' device, and read a joystick.",
  projects:[{f:"09.1.1_ColorfulSoftlight",r:"python ColorfulSoftlight.py",d:"Three pots mixing RGB by hand.",g:""},
   {f:"10.1.1_Nightlamp",r:"python Nightlamp.py",d:"Photoresistor → automatic light.",g:""},
   {f:"11.1.1_Thermometer",r:"python Thermometer.py",d:"Thermistor → temperature with a little math.",g:"Show °C changing when you pinch the thermistor; skip the equation."},
   {f:"12.1.1_Joystick",r:"python Joystick.py",d:"Two analog axes + a button.",g:""}],
  challenge:"Combine the photoresistor and a buzzer into a 'don't open the fridge at night' alarm.",
  checks:[{q:"What happens to the photoresistor's ADC value as the room darkens?",a:"Its resistance changes the measured voltage, so the number moves with light level."},
   {q:"Where would you change what counts as 'dark'?",a:"At the threshold number in the if statement that compares the reading."},
   {q:"What does a joystick report?",a:"Two analog values (X and Y) plus a digital button press."}]},
 {id:"s5",n:5,title:"Motion & power",arc:"Motors need their own power → drivers → angle vs spin",
  obj:"Drive a DC motor, a relay, a servo (exact angles), and a stepper (exact steps) — safely, through driver chips.",
  idea:"from gpiozero import Servo\nfrom time import sleep\n\nservo = Servo(18)\nservo.min(); sleep(1)   # 0 deg\nservo.mid(); sleep(1)   # 90 deg\nservo.max(); sleep(1)   # 180 deg",
  projects:[{f:"13.1.1_Motor",r:"python Motor.py",d:"DC motor via an L293D driver.",g:"Never power a motor from a GPIO pin — use the driver board with its own power."},
   {f:"14.1.1_Relay",r:"python Relay.py",d:"Switch bigger loads safely.",g:""},
   {f:"15.1.1_Sweep",r:"python Sweep.py",d:"Servo to a precise angle.",g:"On Pi 5, ignore a pigpio-backend warning — lgpio still drives it."},
   {f:"16.1.1_SteppingMotor",r:"python SteppingMotor.py",d:"Stepper via a ULN2003 driver.",g:"Match the ULN2003 connector orientation to the diagram."}],
  challenge:"Make the servo a needle gauge that follows the potentiometer from Session 3.",
  checks:[{q:"Why can't a motor run directly off a GPIO pin?",a:"Motors draw far more current than a pin can supply and make noise; the driver handles power and protects the Pi."},
   {q:"Stepper vs servo — when?",a:"Stepper for full, continuous, precise rotation in steps. A servo only holds an angle within ~180°."},
   {q:"What does a relay switch?",a:"Higher-voltage/current devices — an isolated switch the Pi can flip."}]},
 {id:"s6",n:6,title:"Displays",arc:"Shift registers → multiplexing → I²C displays",
  obj:"Use a shift register to drive many LEDs, show digits and dot patterns, and print text to an I²C LCD.",
  projects:[{f:"17.1.1_LightWater02",r:"python LightWater02.py",d:"74HC595 shift register basics.",g:"Lots of wires — check each row before powering on."},
   {f:"18.1.1_SevenSegmentDisplay",r:"python SevenSegmentDisplay.py",d:"Driving digits via the 74HC595.",g:""},
   {f:"18.2.1_StopWatch",r:"python StopWatch.py",d:"A real 4-digit counting display.",g:""},
   {f:"19.1.1_LEDMatrix",r:"python LEDMatrix.py",d:"8×8 dot patterns & scrolling.",g:""},
   {f:"20.1.1_I2CLCD1602",r:"python I2CLCD1602.py",d:"Text on an LCD over I²C.",g:"No text? Adjust the contrast pot on the LCD's back; check the address with i2cdetect."}],
  challenge:"Show the live potentiometer percentage on the LCD, or scroll your name across the matrix.",
  checks:[{q:"Why use a shift register instead of one pin per LED?",a:"It controls many outputs with only a few pins by clocking data in serially."},
   {q:"What protocol do the LCD and the ADC share?",a:"I²C — the same two-wire bus, which is why both need I²C enabled."},
   {q:"What turns the matrix dots on?",a:"Selecting a row and driving the column pins (multiplexing) fast enough to look steady."}]},
 {id:"s7",n:7,title:"Smart sensors & interaction",arc:"Digital protocols → keypad → motion, distance, tilt",
  obj:"Read temperature/humidity, a keypad, motion, distance, and tilt — the building blocks of the capstones.",
  idea:"from gpiozero import DistanceSensor\nfrom time import sleep\n\nsensor = DistanceSensor(echo=24, trigger=23)\nwhile True:\n    print(round(sensor.distance*100, 1), 'cm')\n    sleep(0.5)",
  projects:[{f:"21.1.1_DHT11",r:"python DHT11.py",d:"Temperature + humidity over a 1-wire protocol.",g:"Occasional failed reads are normal — the code retries."},
   {f:"22.1.1_MatrixKeypad",r:"python MatrixKeypad.py",d:"Reading a 4×4 keypad (row/column scan).",g:""},
   {f:"23.1.1_SenseLED",r:"python SenseLED.py",d:"PIR motion sensor triggers an LED.",g:"PIR has a ~30s warm-up and two trim pots."},
   {f:"24.1.1_UltrasonicRanging",r:"python UltrasonicRanging.py",d:"Distance by timing an echo.",g:"Echo is 5V — use the resistor divider so GPIO24 sees ~3.3V."},
   {f:"25.1.1_MPU6050",r:"python MPU6050.py",d:"Accelerometer/gyro orientation over I²C.",g:""}],
  challenge:"Beep faster as your hand approaches the ultrasonic sensor (parking-sensor in miniature).",
  checks:[{q:"Why does the DHT11 occasionally need a retry?",a:"Tight single-wire timing means the Pi sometimes misses a bit; re-reading almost always works."},
   {q:"What two pins does the ultrasonic sensor need, and why?",a:"Trigger (send the chirp) and Echo (time the return). Distance = echo time × speed of sound ÷ 2."},
   {q:"What does a PIR sensor detect?",a:"Changes in infrared (heat) from a warm body moving — motion, not mere presence."}]},
 {id:"s8",n:8,title:"IoT, capstones & permanence",arc:"Control from a browser → combine everything → make it permanent",
  obj:"Control hardware over the network, then build a capstone that fuses several components.",
  projects:[{f:"26.1.1_WebIO",r:"python WebIO.py   (then open the Pi's IP in a browser)",d:"Control hardware over the network (IoT).",g:""},
   {f:"27.2.1_LightWater03",r:"(soldering project)",d:"Moving from breadboard to a soldered build.",g:"Adult supervision + ventilation for soldering."}],
  challenge:"Pick a capstone (left nav) and build it from projects you've already run — no copying the solution.",
  checks:[{q:"What does WebIO let you do that a plain script can't?",a:"Control the Pi's pins from any browser on the network — the foundation of an IoT device."},
   {q:"How do you choose which projects to combine for a capstone?",a:"Match the goal to its parts: 'show temperature' = DHT11 (sense) + LCD (display)."}]}
];
const CAPSTONES=[["Smart night-light","Photoresistor (10) + RGB LED (05)","LED fades on as the room darkens."],
 ["Mini weather station","DHT11 (21) + LCD1602 (20)","Live temperature & humidity on a screen."],
 ["Ultrasonic theremin","Ultrasonic (24) + passive buzzer (06.2)","Hand distance controls pitch."],
 ["Reverse parking sensor","Ultrasonic (24) + buzzer (06) + LEDs (03)","Beeps/flashes faster as objects approach."],
 ["Keypad door lock","Keypad (22) + servo (15) + LCD (20)","Correct code rotates the servo to 'unlock'."],
 ["Intruder alarm","PIR (23) + buzzer (06) + LED","Motion trips an alarm; reset to re-arm."],
 ["Web sensor dashboard","WebIO (26) + any sensor","Read a sensor from your phone's browser."],

const HABITS=[["Run first, explain second","Get the LED blinking before dissecting the code."],
 ["Predict, then run","Ask 'what will this do?' before every run."],
 ["One new idea per project","Each project adds exactly one concept over the last."],
 ["Pair and swap","One wires, one types, then swap. Verbalizing doubles retention."],
 ["Treat bugs as the lesson","A loose jumper or wrong pin is the curriculum."],
 ["End on a working demo","Momentum is the strongest motivator beginners have."]];

const SKEY="piCourseDone_v1";let done={};try{done=JSON.parse(localStorage.getItem(SKEY))||{};}catch(e){done={};}
let current=location.hash?location.hash.slice(1):"intro";
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function saveDone(){try{localStorage.setItem(SKEY,JSON.stringify(done));}catch(e){}}
function pct(){let c=SESSIONS.filter(function(s){return done[s.id];}).length;return Math.round(c/SESSIONS.length*100);}
function renderNav(){
 let h='<div class="grp">Get started</div><div class="navItem '+(current==='intro'?'active':'')+'" data-go="intro"><span class="dot">i</span>About this course</div><div class="grp">Sessions</div>';
 SESSIONS.forEach(function(s){h+='<div class="navItem '+(current===s.id?'active':'')+' '+(done[s.id]?'complete':'')+'" data-go="'+s.id+'"><span class="dot">'+(done[s.id]?'✓':s.n)+'</span>'+esc(s.title)+'</div>';});
 h+='<div class="grp">Go further</div><div class="navItem '+(current==='capstones'?'active':'')+'" data-go="capstones"><span class="dot">★</span>Capstone projects</div><div class="navItem '+(current==='teach'?'active':'')+'" data-go="teach"><span class="dot">♦</span>How to teach it</div>';
 document.getElementById('nav').innerHTML=h;
 document.querySelectorAll('.navItem').forEach(function(el){el.onclick=function(){go(el.dataset.go);document.getElementById('nav').classList.remove('open');};});
}
function codeBlock(t){return '<div class="code">'+esc(t)+'<button class="cp">Copy</button></div>';}
function sessionHTML(s){
 let h='<div class="kicker">Session '+s.n+'</div><h2 class="title">'+esc(s.title)+'</h2><div class="arc">'+esc(s.arc)+'</div>'
 +'<div class="markrow"><input type="checkbox" id="mark" '+(done[s.id]?'checked':'')+'><label for="mark">Mark Session '+s.n+' complete</label></div>'
 +'<div class="obj"><b>Goal:</b> '+esc(s.obj)+'</div>';
 if(s.idea)h+='<div class="idea"><div class="lbl">The idea, in gpiozero</div>'+codeBlock(s.idea)+'</div>';
 if(SD[s.id])h+='<h3 class="sec">Wiring schematic</h3><figure>'+schem(SD[s.id])+'<figcaption>Pins from the Freenove code. Full schematic + board holes: <a href="lesson-'+s.id+'.html" target="_blank">open this lesson&#39;s schematic →</a>.</figcaption></figure>';
 h+='<h3 class="sec">Projects to build (run on the Pi)</h3>';
 s.projects.forEach(function(p){h+='<div class="proj"><div class="pf">'+esc(p.f)+'</div><div class="pn">'+esc(p.f.replace(/^[0-9.]+_/,''))+'</div><div class="pd">'+esc(p.d)+'</div><div class="run">cd '+esc(PREFIX+p.f)+' &amp;&amp; '+esc(p.r)+'<button>Copy</button></div>'+(p.g?'<div class="gotcha">'+esc(p.g)+'</div>':'')+'</div>';});
 h+='<div class="challenge"><div class="lbl">⚙ Challenge</div><div>'+esc(s.challenge)+'</div></div>';
 h+='<h3 class="sec">Check your understanding</h3>';
 s.checks.forEach(function(c){h+='<div class="q"><div class="qq">'+esc(c.q)+'</div><button class="reveal">Show answer</button><div class="ans">'+esc(c.a)+'</div></div>';});
 const idx=SESSIONS.indexOf(s);const prev=idx>0?SESSIONS[idx-1].id:'intro';const next=idx<SESSIONS.length-1?SESSIONS[idx+1].id:'capstones';
 h+='<div class="navbtns"><button data-go="'+prev+'">← Back</button><button data-go="'+next+'">Next →</button></div>';
 return h;
}
function introHTML(){
 return '<div class="kicker">Welcome</div><h2 class="title">Raspberry Pi Electronics</h2><div class="arc">A hands-on course with the Freenove Ultimate Starter Kit — for adult beginners, in Python.</div>'
 +'<div class="obj">Eight sessions take you from blinking one LED to building real projects that sense and react to the world. Each session: build a few projects, see the wiring schematic, take on a challenge, check your understanding. Progress is saved in this browser.</div>'
 +'<h3 class="sec">How it works</h3><div class="grid2"><div class="mini"><h4>Run on the Pi</h4><p>You edit on Windows (PyCharm/Thonny); code runs on the Pi. Each project card has the exact command.</p></div>'
 +'<div class="mini"><h4>Wired-up for you</h4><p>Every session shows a schematic with the real pins. Full diagrams: the Freenove PDF.</p></div>'
 +'<div class="mini"><h4>One idea at a time</h4><p>Every project adds a single new concept — output, PWM, analog input, motors, displays…</p></div>'
 +'<div class="mini"><h4>Finish with a capstone</h4><p>Combine it into something real: a weather station, parking sensor, door lock.</p></div></div>'
 +'<h3 class="sec">Before you start</h3><div class="obj">Set up the Pi and tools with <b>setup-guide.html</b>, then run <b>pi-classroom-setup.sh</b> on the Pi. All schematics in one place: <a href="schematics.html" target="_blank">schematics.html</a>.</div>'
 +'<div class="navbtns"><button disabled>← Back</button><button data-go="s1">Start Session 1 →</button></div>';
}
function capstonesHTML(){
 let h='<div class="kicker">Go further</div><h2 class="title">Capstone projects</h2><div class="arc">Each fuses earlier projects. Build from what you’ve run.</div><div class="grid2">';
 CAPSTONES.forEach(function(c){h+='<div class="mini"><h4>'+esc(c[0])+'</h4><p><b style="color:var(--teal)">'+esc(c[1])+'</b><br>'+esc(c[2])+'</p></div>';});
 h+='</div><div class="challenge"><div class="lbl">Rubric (10 pts)</div><div>Works as specified (4) · you can explain the code (3) · clean & safe wiring (2) · one extension (1).</div></div><div class="navbtns"><button data-go="s8">← Back</button><button data-go="teach">How to teach it →</button></div>';
 return h;
}
function teachHTML(){
 let h='<div class="kicker">For instructors</div><h2 class="title">How to teach it well</h2><div class="arc">Six habits that make this course land.</div><div class="grid2">';
 HABITS.forEach(function(t,i){h+='<div class="mini"><h4>'+(i+1)+'. '+esc(t[0])+'</h4><p>'+esc(t[1])+'</p></div>';});
 h+='</div><h3 class="sec">Debugging routine</h3><div class="obj">1) Expected vs. happened? · 2) Power & wires — on, in the right row? · 3) Do code pins match the board? · 4) Read the error’s last line. · 5) Change ONE thing, run again. · 6) Compare to the working Freenove example.</div><div class="navbtns"><button data-go="capstones">← Back</button><button data-go="intro">Back to start →</button></div>';
 return h;
}
function go(key){
 current=key;location.hash=key;const main=document.getElementById('main');
 if(key==='intro')main.innerHTML=introHTML();
 else if(key==='capstones')main.innerHTML=capstonesHTML();
 else if(key==='teach')main.innerHTML=teachHTML();
 else{const s=SESSIONS.find(function(x){return x.id===key;});main.innerHTML=s?sessionHTML(s):introHTML();}
 wire();renderNav();updateBar();window.scrollTo(0,0);
}
function updateBar(){document.getElementById('barFill').style.width=pct()+'%';document.getElementById('pctText').textContent=pct()+'%';}
function wire(){
 const mark=document.getElementById('mark');
 if(mark)mark.onchange=function(){const s=SESSIONS.find(function(x){return x.id===current;});done[s.id]=mark.checked;saveDone();renderNav();updateBar();};
 document.querySelectorAll('.q .reveal').forEach(function(b){b.onclick=function(){const q=b.closest('.q');q.classList.toggle('open');b.textContent=q.classList.contains('open')?'Hide answer':'Show answer';};});
 document.querySelectorAll('[data-go]').forEach(function(b){if(b.classList.contains('navItem'))return;b.onclick=function(){go(b.dataset.go);};});
 document.querySelectorAll('.code .cp, .run button').forEach(function(btn){btn.onclick=function(){let node=btn.parentNode.cloneNode(true);const x=node.querySelector('button');if(x)x.remove();navigator.clipboard.writeText(node.textContent.trim()).then(function(){const t=btn.textContent;btn.textContent='Copied';btn.classList.add('done');setTimeout(function(){btn.textContent=t;btn.classList.remove('done');},1300);});};});
}
document.getElementById('menuBtn').onclick=function(){document.getElementById('nav').classList.toggle('open');};
window.addEventListener('hashchange',function(){if(location.hash.slice(1)!==current)go(location.hash.slice(1)||'intro');});
go(current);
</script>
</body>
</html>
